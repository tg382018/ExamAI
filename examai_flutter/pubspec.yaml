name: examai
description: AI-powered exam generator app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # HTTP
  dio: ^5.4.3
  
  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.1
  
  # Firebase / FCM
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  
  # Navigation
  go_router: ^14.2.7
  
  # UI
  flutter_markdown: ^0.7.3
  shimmer: ^3.0.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.4.2
  flutter_math_fork: ^0.7.4
  file_picker: ^10.3.10
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/logo.png
    - assets/animations/
